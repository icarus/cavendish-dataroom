<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CUSTOMIZE: Change the title to your company name -->
  <title>Your Company — Sign In</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dataroom/dataroom.css">
</head>
<body>
  <noscript>
    <div style="padding:40px;text-align:center;font-family:sans-serif;">
      <h2>JavaScript Required</h2>
      <p>Please enable JavaScript to access the dataroom.</p>
    </div>
  </noscript>

  <div id="app" class="auth-page">
    <div class="auth-card">
      <!-- CUSTOMIZE: Change the logo text to your company name -->
      <div class="auth-logo"><a href="/">Your Company</a></div>

      <h1 class="auth-title">Sign in</h1>
      <p class="auth-subtitle">Enter your email to view the dataroom</p>

      <div id="message" class="auth-message"></div>

      <!-- Google SSO -->
      <button id="googleBtn" class="btn btn-google" type="button">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>

      <div class="auth-divider">or</div>

      <!-- Email -->
      <form id="emailForm" autocomplete="off">
        <div class="auth-input-group">
          <input
            type="email"
            id="emailInput"
            class="auth-input"
            placeholder="Enter your email"
            required
          >
        </div>
        <button type="submit" id="emailBtn" class="btn btn-primary">
          Continue
        </button>
      </form>
    </div>

    <div class="auth-footer">
      <a href="/dataroom/">Use a different access code</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/dataroom/auth.js"></script>
  <script>
    (function() {
      'use strict';

      var googleBtn = document.getElementById('googleBtn');
      var emailForm = document.getElementById('emailForm');
      var emailInput = document.getElementById('emailInput');
      var emailBtn = document.getElementById('emailBtn');

      // Initialize guard (may redirect if no password or already authenticated)
      InvestorAuth.guardLoginPage();

      // Google SSO
      googleBtn.addEventListener('click', function() {
        googleBtn.disabled = true;
        googleBtn.textContent = 'Redirecting...';
        InvestorAuth.signInWithGoogle();
      });

      // Email — store session and redirect directly (no OTP)
      emailForm.addEventListener('submit', function(e) {
        e.preventDefault();
        var email = emailInput.value.trim();
        if (!email) return;

        emailBtn.disabled = true;
        emailBtn.textContent = 'Loading...';

        InvestorAuth.setEmailSession(email);
        window.location.href = '/dataroom/dataroom.html';
      });
    })();
  </script>
</body>
</html>
