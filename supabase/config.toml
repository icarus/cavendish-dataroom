# Open Dataroom — Supabase Configuration
# For detailed docs: https://supabase.com/docs/guides/local-development/cli/config

project_id = "open-dataroom"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:8888"
# CUSTOMIZE: Add your production URL to the redirect list
additional_redirect_urls = ["http://localhost:8888"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "per_worker"
deno_version = 2
